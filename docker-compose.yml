services:
  mongo:
    image: mongo:8
    container_name: puryfi-chaster-db
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-puryfi}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-puryfi}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      timeout: 5s
      retries: 5

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: ${BACKEND_URL:-http://localhost:8000}
    container_name: puryfi-chaster-front
    restart: unless-stopped
    ports:
      - "5173:80"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: puryfi-chaster-server
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - CHASTER_DEVELOPER_TOKEN=${CHASTER_DEVELOPER_TOKEN}
      - CHASTER_WEBHOOK_USER=${CHASTER_WEBHOOK_USER}
      - CHASTER_WEBHOOK_PWD=${CHASTER_WEBHOOK_PWD}
      - DATABASE_URL=${DATABASE_URL}
      - BACKEND_URL=${BACKEND_URL}
      - FRONT_URL=${FRONT_URL}

  ngrok:
    image: ngrok/ngrok:alpine
    container_name: puryfi-chaster-ngrok
    restart: unless-stopped
    ports:
      - "4040:4040"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    volumes:
      - ./ngrok.yml:/etc/ngrok.yml:ro
    command: [ "start", "--all", "--config", "/etc/ngrok.yml" ]
    depends_on:
      - front
      - server

volumes:
  mongo_data:
